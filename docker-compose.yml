services:
  replayfix-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: replayfix
      POSTGRES_USER: replayfix
      POSTGRES_PASSWORD: replayfix
    ports:
      - "5433:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U replayfix -d replayfix
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - replayfix-db-data:/var/lib/postgresql/data

  replayfix:
    build: .
    depends_on:
      replayfix-db:
        condition: service_healthy
    environment:
      REPLAYFIX_DB_URL: jdbc:postgresql://replayfix-db:5432/replayfix
      REPLAYFIX_DB_USERNAME: replayfix
      REPLAYFIX_DB_PASSWORD: replayfix
      REPLAYFIX_MODE: DRY_RUN
    ports:
      - "8088:8088"
    volumes:
      - ./config:/app/config:ro
      - ./replay-packages:/app/replay-packages:ro
      - ./work:/app/work

volumes:
  replayfix-db-data:
