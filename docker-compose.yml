services:
  replaylab-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: replaylab
      POSTGRES_USER: replaylab
      POSTGRES_PASSWORD: replaylab
    ports:
      - "5433:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U replaylab -d replaylab
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - replaylab-db-data:/var/lib/postgresql/data

  replaylab:
    build: .
    depends_on:
      replaylab-db:
        condition: service_healthy
    environment:
      REPLAYLAB_DB_URL: jdbc:postgresql://replaylab-db:5432/replaylab
      REPLAYLAB_DB_USERNAME: replaylab
      REPLAYLAB_DB_PASSWORD: replaylab
      REPLAYLAB_MODE: DRY_RUN
    ports:
      - "8088:8088"
    volumes:
      - ./config:/app/config:ro
      - ./replay-packages:/app/replay-packages:ro
      - ./work:/app/work

volumes:
  replaylab-db-data:
