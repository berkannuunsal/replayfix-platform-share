# Per-application replay definitions.

replayfix:
  targets:
    sample-order-service:
      repository: sample-order-service
      clone-url: ${TARGET_CLONE_URL:https://bitbucket.internal.example/scm/project/sample-order-service.git}
      image: ${TARGET_IMAGE:registry.internal.example/sample-order-service:1.0.0}
      container-port: 8080
      health-path: /actuator/health
      build-command: mvn -B clean verify

      datasource-url-env: SPRING_DATASOURCE_URL
      datasource-username-env: SPRING_DATASOURCE_USERNAME
      datasource-password-env: SPRING_DATASOURCE_PASSWORD

      environment:
        SPRING_PROFILES_ACTIVE: replayfix
        LOGGING_LEVEL_ROOT: INFO

      dependencies:
        - postgresql
        - castlemock

      database:
        name: replaydb
        schema-file: ./replay-packages/sample-null-order/schema.sql
        seed-file: ./replay-packages/sample-null-order/seed.sql
        persistent: false
        storage-size: 2Gi

      replay:
        method: POST
        path: /api/orders
        request-file: ./replay-packages/sample-null-order/request.json
        headers:
          Content-Type: application/json
          X-ReplayFix-Case: sample-null-order
        expected-status: 500
        expected-body-regex: ".*"
        expected-log-regex: "(NullPointerException|IllegalStateException|ORDER_VALIDATION_ERROR)"
        request-timeout: 30s

      git:
        source-branch: main
        branch-prefix: replayfix/
        reviewer-users: []

    backend:
      repository: ${BACKEND_REPOSITORY_SLUG:bss-backend}
      clone-url: ${BACKEND_CLONE_URL}
      build-command: mvn -B clean test

      git:
        source-branch: test2
        branch-prefix: replayfix/
        reviewer-users: []

  repository-resolution:
    minimum-score: 30
    max-candidates: 4
    mappings:
      backend:
        aliases:
          - bss-backend
          - bss-backend-batch
          - backend
          - customerorder
          - customer-order
          - bar
          - payment
          - camunda
          - dce-commercebackend
        endpoint-prefixes:
          - /customerorder
          - /DCE-CommerceBackend
        keywords:
          - omintegration
          - recurring_payment_callback
          - status 12
          - unauthorized
      bookmark-order-management-esb:
        aliases:
          - wso2
          - esb
          - order-management
          - order management
          - omintegration
        endpoint-prefixes:
          - /customerorder/omintegration
        keywords:
          - integration
          - mediation
          - sequence
          - proxy service
      ntf-engine:
        aliases:
          - ntf
          - ntf-engine
          - notification
          - notify
        endpoint-prefixes:
          - /notification
          - /notify
        keywords:
          - notification
          - sms
          - email
          - message
      loyalty-engine:
        aliases:
          - loyalty
          - loyalty-engine
          - reward
          - campaign
        endpoint-prefixes:
          - /loyalty
        keywords:
          - loyalty
          - reward
          - campaign
          - benefit
