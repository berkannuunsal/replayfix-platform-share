image:
  repository: registry.internal.example/replayfix-platform
  tag: 0.1.0
  pullPolicy: IfNotPresent

replicaCount: 1
imagePullSecrets: []

service:
  port: 8088

database:
  url: jdbc:postgresql://replayfix-control-db:5432/replayfix
  usernameSecret:
    name: replayfix-control-db
    key: username
  passwordSecret:
    name: replayfix-control-db
    key: password

configMapName: replayfix-config
secretName: replayfix-integrations

serviceAccount:
  create: true
  name: replayfix

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi
