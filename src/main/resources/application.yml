spring:
  application:
    name: replayfix-platform
  config:
    import:
      - optional:file:./config/external-services.yml
      - optional:file:./config/ai-company-local.yml
      - optional:file:./config/replay-targets.yml
      - optional:file:./config/log-parsers.yml
  datasource:
    url: ${REPLAYFIX_DB_URL:jdbc:postgresql://localhost:5433/replayfix}
    username: ${REPLAYFIX_DB_USERNAME:replayfix}
    password: ${REPLAYFIX_DB_PASSWORD:replayfix}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

replayfix:
  mode: ${REPLAYFIX_MODE:DRY_RUN}
  workspace-dir: ${REPLAYFIX_WORKSPACE:./work}
  namespace-prefix: ${REPLAYFIX_NAMESPACE_PREFIX:replayfix}
  cleanup-after: ${REPLAYFIX_CLEANUP_AFTER:6h}
  demo:
    enabled: ${REPLAYFIX_DEMO_ENABLED:false}
    allow-reset: ${REPLAYFIX_DEMO_ALLOW_RESET:false}
  ai:
    enabled: ${REPLAYFIX_AI_ENABLED:false}
    provider: ${REPLAYFIX_AI_PROVIDER:DISABLED}
    model: ${REPLAYFIX_AI_MODEL:mock-replayfix-v1}
    max-input-chars: ${REPLAYFIX_AI_MAX_INPUT_CHARS:120000}
    max-output-chars: ${REPLAYFIX_AI_MAX_OUTPUT_CHARS:30000}
    temperature: ${REPLAYFIX_AI_TEMPERATURE:0.1}
    include-source-code: ${REPLAYFIX_AI_INCLUDE_SOURCE_CODE:false}
    company:
      base-url: ${REPLAYFIX_AI_COMPANY_BASE_URL:}
      endpoint: ${REPLAYFIX_AI_COMPANY_ENDPOINT:/v1/chat/completions}
      model: ${REPLAYFIX_AI_COMPANY_MODEL:${REPLAYFIX_AI_MODEL:}}
      auth-type: ${REPLAYFIX_AI_COMPANY_AUTH_TYPE:BEARER}
      token: ${REPLAYFIX_AI_COMPANY_TOKEN:}
      timeout-ms: ${REPLAYFIX_AI_COMPANY_TIMEOUT_MS:30000}
      max-input-chars: ${REPLAYFIX_AI_COMPANY_MAX_INPUT_CHARS:${REPLAYFIX_AI_MAX_INPUT_CHARS:120000}}
      max-output-chars: ${REPLAYFIX_AI_COMPANY_MAX_OUTPUT_CHARS:${REPLAYFIX_AI_MAX_OUTPUT_CHARS:30000}}
  notifications:
    webhook:
      enabled: ${REPLAYFIX_NOTIFICATION_WEBHOOK_ENABLED:false}
      url: ${REPLAYFIX_NOTIFICATION_WEBHOOK_URL:}
      secret: ${REPLAYFIX_NOTIFICATION_WEBHOOK_SECRET:}
      connect-timeout-seconds: 10
      read-timeout-seconds: 20
      max-attempts: 3
  policy:
    allow-production-read: ${REPLAYFIX_ALLOW_PRODUCTION_READ:false}
    allow-source-checkout: ${REPLAYFIX_ALLOW_SOURCE_CHECKOUT:false}
    source-history-depth: ${REPLAYFIX_SOURCE_HISTORY_DEPTH:500}
    allow-generated-code-write: ${REPLAYFIX_ALLOW_GENERATED_CODE_WRITE:false}
    allow-git-push: ${REPLAYFIX_ALLOW_GIT_PUSH:false}
    allow-pull-request-creation: ${REPLAYFIX_ALLOW_PR_CREATION:false}
    require-human-approval: true
    allow-ai-source-code: ${REPLAYFIX_ALLOW_AI_SOURCE_CODE:false}
    max-log-lines: 1000
    max-ai-input-characters: 100000
    ai-bundle-max-chars: ${REPLAYFIX_AI_BUNDLE_MAX_CHARS:120000}
    ai-bundle-max-loki-chars: ${REPLAYFIX_AI_BUNDLE_MAX_LOKI_CHARS:40000}
    ai-bundle-max-source-chars: ${REPLAYFIX_AI_BUNDLE_MAX_SOURCE_CHARS:40000}
    ai-bundle-max-tempo-chars: ${REPLAYFIX_AI_BUNDLE_MAX_TEMPO_CHARS:15000}
    ai-bundle-max-jira-chars: ${REPLAYFIX_AI_BUNDLE_MAX_JIRA_CHARS:15000}
    allow-test-execution: ${REPLAYFIX_ALLOW_TEST_EXECUTION:false}
    allow-jira-comment-write: ${REPLAYFIX_ALLOW_JIRA_COMMENT_WRITE:false}
    maven-executable: ${REPLAYFIX_MAVEN_EXECUTABLE:mvn}
    local-test-timeout-seconds: ${REPLAYFIX_LOCAL_TEST_TIMEOUT_SECONDS:600}
    local-test-max-output-chars: ${REPLAYFIX_LOCAL_TEST_MAX_OUTPUT_CHARS:100000}
    pattern-test-min-confidence: ${REPLAYFIX_PATTERN_TEST_MIN_CONFIDENCE:0.65}
    kubectl-executable: ${REPLAYFIX_KUBECTL_EXECUTABLE:kubectl}
    kubernetes-timeout-seconds: ${REPLAYFIX_KUBERNETES_TIMEOUT_SECONDS:30}
  integrations:
    tempo:
      enabled: ${REPLAYFIX_TEMPO_ENABLED:true}
      access-mode: ${REPLAYFIX_TEMPO_ACCESS_MODE:GRAFANA_PROXY}
      base-url: ${REPLAYFIX_TEMPO_BASE_URL:}
      datasource-uid: ${REPLAYFIX_TEMPO_DATASOURCE_UID:}
      token: ${TEMPO_TOKEN:}
      auth-type: ${REPLAYFIX_TEMPO_AUTH_TYPE:BEARER}
      timeout: ${REPLAYFIX_TEMPO_TIMEOUT:30s}
      max-traces-per-case: ${REPLAYFIX_TEMPO_MAX_TRACES_PER_CASE:5}
      max-spans-per-trace: ${REPLAYFIX_TEMPO_MAX_SPANS_PER_TRACE:5000}
      max-response-chars: ${REPLAYFIX_TEMPO_MAX_RESPONSE_CHARS:2000000}
    confluence:
      enabled: ${REPLAYFIX_CONFLUENCE_ENABLED:false}
      base-url: ${REPLAYFIX_CONFLUENCE_BASE_URL:}
      username: ${REPLAYFIX_CONFLUENCE_USERNAME:}
      token: ${CONFLUENCE_TOKEN:}
      auth-type: ${REPLAYFIX_CONFLUENCE_AUTH_TYPE:BASIC}
      timeout: ${REPLAYFIX_CONFLUENCE_TIMEOUT:30s}
      max-search-results: ${REPLAYFIX_CONFLUENCE_MAX_SEARCH_RESULTS:15}
      max-pages-per-case: ${REPLAYFIX_CONFLUENCE_MAX_PAGES_PER_CASE:5}
      max-page-chars: ${REPLAYFIX_CONFLUENCE_MAX_PAGE_CHARS:30000}
      max-total-chars: ${REPLAYFIX_CONFLUENCE_MAX_TOTAL_CHARS:80000}
      allowed-space-keys: ${REPLAYFIX_CONFLUENCE_ALLOWED_SPACE_KEYS:}
    jira-webhook:
      enabled: ${REPLAYFIX_JIRA_WEBHOOK_ENABLED:false}
      secret: ${JIRA_WEBHOOK_SECRET:}
      allowed-event-types:
        - jira:issue_created
        - jira:issue_updated
      allowed-project-keys: ${REPLAYFIX_JIRA_WEBHOOK_ALLOWED_PROJECTS:FIZZMS}
      allowed-issue-types: ${REPLAYFIX_JIRA_WEBHOOK_ALLOWED_ISSUE_TYPES:Bug,Defect}
      allowed-statuses: ${REPLAYFIX_JIRA_WEBHOOK_ALLOWED_STATUSES:Open,To Do,In Progress}
      max-body-chars: ${REPLAYFIX_JIRA_WEBHOOK_MAX_BODY_CHARS:1000000}
      replay-window-seconds: ${REPLAYFIX_JIRA_WEBHOOK_REPLAY_WINDOW_SECONDS:300}
      auto-preview-enabled: ${REPLAYFIX_JIRA_AUTO_PREVIEW_ENABLED:true}
  targets:
    fizzms-backend:
      repository: fizzms-api
      clone-url: ${REPLAYFIX_FIZZMS_CLONE_URL:}
      local-source-path: ${REPLAYFIX_FIZZMS_LOCAL_SOURCE_PATH:}
